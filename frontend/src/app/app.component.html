<main #main class="main position-relative">
  <img
    class="img1 position-absolute top-0 start-0 animate__animated animate__zoomInUp animate__slow"
    alt="logo TechMind"
    width="100px"
    #logo
    [src]="urlImage"
  />
  <div class="font position-absolute top-0 start-0 d-flex">
    <div class="letter letter1">e</div>
    <div class="letter letter2">c</div>
    <div class="letter letter3">h</div>
    <div class="letter letter4">M</div>
    <div class="letter letter5">i</div>
    <div class="letter letter6">n</div>
    <div class="letter letter7">d</div>
  </div>
  <div *ngIf="!canShow" class="d-flex flex-column justify-content-center">
    <div class="form-floating mb-3">
      <input
        type="text"
        class="form-control"
        id="floatingInput"
        placeholder="User"
        (keyup)="getUser($event)"
      />
      <label for="floatingInput">User Name</label>
    </div>
    <div class="form-floating">
      <input
        type="password"
        class="form-control"
        id="floatingPassword"
        placeholder="Password"
        (keyup)="getPass($event)"
      />
      <label for="floatingPassword">Password</label>
    </div>
    <button class="mt-3 btn btn-success" (click)="loginInput()">Entrar</button>
  </div>
  <app-loading
    *ngIf="canShow"
    class="position-absolute top-50 start-50 translate-middle"
  ></app-loading>
</main>
<router-outlet />
