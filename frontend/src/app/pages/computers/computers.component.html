<div class="main">
  <app-navbar
    *ngIf="canView"
    [name]="name"
    [home_class]="home_class"
    [computers_class]="computers_class"
    [device_class]="device_class"
  />
  <app-loading *ngIf="!canView" />
  <div class="w-100">
    <div class="w-100 justify-content-start d-flex div_quantity">
      <div>
        <div class="margin_quantity mb-2">
          <span
            class="buton_quantity"
            [ngClass]="ten_quantity"
            (click)="getTen()"
            ><b>10</b></span
          >
        </div>
        <div class="margin_quantity">
          <span
            class="buton_quantity"
            [ngClass]="fifty_quantity"
            (click)="getFifty()"
            ><b>50</b></span
          >
        </div>
      </div>
      <div>
        <div class="margin_quantity mb-2">
          <span
            class="buton_quantity"
            [ngClass]="one_hundred_quantity"
            (click)="getOneHundred()"
            ><b>100</b></span
          >
        </div>
        <div class="margin_quantity">
          <span
            class="buton_quantity"
            [ngClass]="all_quantity"
            (click)="getAll()"
            ><b>All</b></span
          >
        </div>
      </div>
    </div>
  </div>
  <table class="tb">
    <thead>
      <tr>
        <th class="thcls text-uppercase">mac_address</th>
        <th class="thcls text-uppercase">
          <div class="w-100 d-flex justify-content-center">
            <div>name</div>
            <div class="mleft">
              <img
                class="img_arrows"
                [src]="arrow_up"
                alt="seta para cima"
                (click)="sortByName()"
              />
              <img
                class="img_arrows"
                [src]="arrow_down"
                alt="seta para baixo"
                (click)="sortDataByNameDescending()"
              />
            </div>
          </div>
        </th>
        <th class="thcls text-uppercase">S.O</th>
        <th class="thcls text-uppercase">distribution</th>
        <th class="thcls text-uppercase">last update</th>
      </tr>
    </thead>
    <tbody *ngIf="canViewMachines">
      <tr
        class="trcls"
        *ngFor="let machine of dataMachines; let i = index"
        (click)="onRowClick(i)"
      >
        <td class="tdsadj">{{ machine[0] }}</td>
        <td class="tdsadj">{{ machine[1] }}</td>
        <td class="tdsadj">{{ machine[2] }}</td>
        <td class="tdsadj">{{ machine[3] }}</td>
        <td class="tdsadj">{{ formatDate(machine[4]) }}</td>
      </tr>
    </tbody>
  </table>
</div>
